<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | TynehamVillage.org</title>
  <meta name="description" content="The page you were looking for could not be found. Return to TynehamVillage.org to explore the history and visitor information for Dorset's ghost village." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://tynehamvillage.org/" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="css/styles.css" rel="stylesheet" />
  <script>
    (function(){var s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',s||(p?'dark':'light'));})();
  </script>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container px-5 d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold" href="index.html">TynehamVillage.org</a>
      <button id="darkModeToggle" class="btn btn-sm btn-outline-light px-2" type="button" aria-label="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <main>
    <div class="container px-5 py-5 text-center" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
      <div>
        <h1 class="display-1 fw-bold text-muted">404</h1>
        <h2 class="fw-bold mb-4">Page Not Found</h2>
        <p class="fs-5 mb-4">Like Tyneham itself, this page seems to have disappeared. The link you followed may be outdated or the page may have moved.</p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
          <a href="index.html" class="btn btn-dark btn-lg">Back to Home</a>
          <a href="history-of-tyneham.html" class="btn btn-outline-secondary btn-lg">Tyneham History</a>
          <a href="opening-times.html" class="btn btn-outline-secondary btn-lg">Opening Times</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white py-4 mt-auto">
    <div class="container px-5 text-center">
      <p class="mb-0 small">&copy; 2026 TynehamVillage.org &mdash; An independent guide to Tyneham, Dorset</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      var btn=document.getElementById('darkModeToggle');
      if(!btn)return;
      var t=document.documentElement.getAttribute('data-theme');
      btn.textContent=t==='dark'?'☀️':'🌙';
      btn.title=t==='dark'?'Switch to light mode':'Switch to dark mode';
      btn.addEventListener('click',function(){
        var c=document.documentElement.getAttribute('data-theme');
        var n=c==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',n);
        localStorage.setItem('theme',n);
        btn.textContent=n==='dark'?'☀️':'🌙';
        btn.title=n==='dark'?'Switch to light mode':'Switch to dark mode';
      });
    });
  </script>
</body>
</html>
